<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Knowledge Hub | Royal Roots Ply India</title>
<meta content="Expert guides on plywood, laminates, interior design and home improvement from Royal Roots Ply India." name="description"/>
<link href="https://www.royalrootsply.com/blog/index.html" rel="canonical"/>
<link href="../assets/images/logo/favicon.png" rel="icon" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet"/>
<style>
    :root{--charcoal:#1A1A1A;--gold:#D4AF37;--gold-light:#F3E5AB;--cream:#FAF9F6;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background-color:var(--charcoal);color:var(--cream);font-family:'Outfit',sans-serif;}
    nav{padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06);}
    .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .nav-logo img{height:36px;object-fit:contain;max-width:130px;}
    .nav-link{color:var(--cream);text-decoration:none;margin-left:28px;font-weight:500;font-size:14px;text-transform:uppercase;letter-spacing:1px;transition:.2s;}
    .nav-link:hover,.nav-link.active{color:var(--gold);}

    .blog-hero{text-align:center;padding:90px 20px 50px;}
    .knowledge-badge{display:inline-block;color:var(--charcoal);background:linear-gradient(135deg,var(--gold),#e8c760);padding:7px 22px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
    .blog-hero h1{font-family:'Newsreader',serif;font-size:clamp(38px,6vw,60px);color:var(--gold-light);margin-bottom:14px;font-weight:400;}
    .blog-hero p{color:rgba(255,255,255,.6);font-size:17px;max-width:580px;margin:0 auto 30px;}

    /* Filter pills */
    .filters{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:40px;}
    .filter-pill{padding:7px 18px;border-radius:30px;border:1.5px solid rgba(255,255,255,.15);cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:rgba(255,255,255,.7);transition:.2s;font-family:inherit;}
    .filter-pill:hover,.filter-pill.active{border-color:var(--gold);color:var(--gold);}

    /* Grid */
    .blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:32px;padding:16px 40px 80px;max-width:1400px;margin:0 auto;}

    /* Card */
    .blog-card{background-size:cover;background-position:center;min-height:380px;display:flex;flex-direction:column;justify-content:flex-end;padding:28px;border-radius:14px;overflow:hidden;position:relative;text-decoration:none;text-align:left;transition:transform .3s;}
    .blog-card:hover{transform:translateY(-6px);}
    .blog-card::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,10,.9) 40%,rgba(0,0,0,.2));transition:.3s;}
    .blog-card__body{position:relative;z-index:2;}
    .blog-card__tag{color:var(--gold);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:block;}
    .blog-card__title{color:white;font-family:'Newsreader',serif;font-size:22px;margin-bottom:10px;line-height:1.3;}
    .blog-card__excerpt{color:rgba(255,255,255,.65);font-size:14px;margin-bottom:18px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .blog-card__cta{color:var(--gold);text-decoration:none;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--gold);padding-bottom:2px;}

    /* Loading / empty */
    .loading-grid,.empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,.4);font-size:16px;}

    /* Skeleton */
    .skeleton{width:100%;min-height:380px;background:linear-gradient(90deg,#2a2a2a 25%,#333 50%,#2a2a2a 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:14px;}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* Pagination */
    .pagination{display:flex;gap:8px;justify-content:center;padding:0 40px 80px;}
    .page-btn{padding:9px 18px;border-radius:8px;border:1.5px solid rgba(255,255,255,.15);cursor:pointer;font-size:14px;font-weight:600;background:transparent;color:rgba(255,255,255,.7);transition:.2s;font-family:inherit;}
    .page-btn:hover,.page-btn.active{border-color:var(--gold);color:var(--gold);}

    footer{text-align:center;padding:50px 20px;color:rgba(255,255,255,.3);border-top:1px solid rgba(255,255,255,.06);}
</style>
</head>
<body>
<nav>
    <a class="nav-logo" href="../index.html">
        <img alt="Homify Roots" src="../assets/images/logo/logo-white.png"/>
        <img alt="Royal Roots Ply" src="../assets/images/logo/logo-color.png"/>
    </a>
    <div>
        <a class="nav-link" href="../index.html">Home</a>
        <a class="nav-link active" href="index.html">Knowledge Hub</a>
        <a class="nav-link" href="../products/index.html">Products</a>
        <a class="nav-link" href="../contact.html">Get Quote</a>
    </div>
</nav>

<header class="blog-hero">
    <span class="knowledge-badge">Expert Resources</span>
    <h1>Knowledge Hub</h1>
    <p>Expert insights on premium plywood, laminates, acrylic, veneer and luxury interior design trends from Royal Roots Ply.</p>
    <div class="filters" id="filterBar">
        <button class="filter-pill active" data-cat="">All Articles</button>
    </div>
</header>

<main>
    <div class="blog-grid" id="blogGrid">
        <!-- Skeletons while loading -->
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
    </div>
    <div class="pagination" id="pagination"></div>
</main>

<footer><p>© 2026 Royal Roots Ply India Pvt. Ltd.</p></footer>

<script>
    const PER_PAGE = 9;
    let allBlogs = [];
    let filteredBlogs = [];
    let currentPage = 1;
    let activeCategory = '';

    const DEFAULT_IMAGES = [
        '../assets/images/blog/photo-1586023492125-27b2c045efd7.jpg',
        '../assets/images/blog/photo-1600566753190-17f0baa2a6c3.jpg',
        '../assets/images/blog/photo-1616486029423-aaa4789e8c9a.jpg',
        '../assets/images/blog/photo-1600210492486-724fe5c67fb0.jpg',
        '../assets/images/blog/photo-1600585154340-be6161a56a0c.jpg',
    ];
    const staticBlogs = [
        {
            title: "The Ultimate Guide to Plywood Grades: MR vs BWR vs BWP",
            category: "Education",
            tag: "Plywood Guide",
            excerpt: "Understanding the difference between MR and BWR grade plywood can save your project thousands. Learn which one to choose for your furniture.",
            slug: "guide-to-plywood-grades",
            image_url: "../assets/images/blog/photo-1600210492486-724fe5c67fb0.jpg"
        },
        {
            title: "Transforming Luxury Spaces with High-Gloss Designer Laminates",
            category: "Design",
            tag: "Laminates",
            excerpt: "Discover how a single laminate choice can redefine your entire living room aesthetic. Explore modern textures and mirror-finish collections.",
            slug: "designer-laminates-guide",
            image_url: "../assets/images/blog/photo-1586023492125-27b2c045efd7.jpg"
        },
        {
            title: "Natural Gurjan Veneer: The Soul of Premium Architectural Projects",
            category: "Luxury",
            tag: "Veneer Hub",
            excerpt: "Natural wood veneers offer a level of sophistication that few other materials can match. See why top architects prefer our Gurjan collection.",
            slug: "luxury-veneer-guide",
            image_url: "../assets/images/blog/photo-1600566753190-17f0baa2a6c3.jpg"
        }
    ];

    async function loadBlogs() {
        const grid = document.getElementById('blogGrid');
        try {
            const response = await fetch('/api/blogs');
            const blogs = await response.json();
            
            if (blogs && blogs.length > 0 && !blogs.error) {
                renderBlogs(blogs);
            } else {
                console.log("No blogs found or error, using static fallback");
                renderBlogs(staticBlogs);
            }
        } catch (error) {
            console.error('Error loading blogs:', error);
            renderBlogs(staticBlogs);
        }
    }

    function renderBlogs(blogs) {
        allBlogs = blogs;
        buildFilters();
        applyFilter('');
    }

    function buildFilters() {
        const cats = [...new Set(allBlogs.map(b => b.category).filter(Boolean))];
        const bar = document.getElementById('filterBar');
        // Clear existing filter pills except "All Articles"
        bar.querySelectorAll('.filter-pill:not([data-cat=""])').forEach(pill => pill.remove());
        cats.forEach(cat => {
            const pill = document.createElement('button');
            pill.className = 'filter-pill';
            pill.dataset.cat = cat;
            pill.textContent = cat;
            pill.onclick = () => applyFilter(cat);
            bar.appendChild(pill);
        });
    }

    function applyFilter(cat) {
        activeCategory = cat;
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('active', p.dataset.cat === cat));
        filteredBlogs = cat ? allBlogs.filter(b => b.category === cat) : [...allBlogs];
        currentPage = 1;
        renderPage();
    }

    function renderPage() {
        const grid = document.getElementById('blogGrid');
        const start = (currentPage - 1) * PER_PAGE;
        const page = filteredBlogs.slice(start, start + PER_PAGE);

        if (!page.length) {
            grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">No articles yet. Check back soon!</div>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        grid.innerHTML = page.map((blog, i) => {
            const img = blog.image_url || DEFAULT_IMAGES[i % DEFAULT_IMAGES.length];
            const link = `/blog/${blog.slug}`;
            return `
            <a class="blog-card" href="${link}" style="background-image:url('${img}')">
                <div class="blog-card__body">
                    <span class="blog-card__tag">${esc(blog.category||'Plywood Guide')} ${blog.tag ? '&bull; '+esc(blog.tag) : ''}</span>
                    <h2 class="blog-card__title">${esc(blog.title)}</h2>
                    <p class="blog-card__excerpt">${esc(blog.excerpt||blog.meta_desc||'')}</p>
                    <span class="blog-card__cta">Read Article →</span>
                </div>
            </a>`;
        }).join('');

        renderPagination();
    }

    function renderPagination() {
        const pag = document.getElementById('pagination');
        const total = Math.ceil(filteredBlogs.length / PER_PAGE);
        if (total <= 1) { pag.innerHTML = ''; return; }
        pag.innerHTML = Array.from({length: total}, (_, i) =>
            `<button class="page-btn ${i+1===currentPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`
        ).join('');
    }

    function goPage(n) {
        currentPage = n;
        renderPage();
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    loadBlogs();
</script>
</body>
</html>
