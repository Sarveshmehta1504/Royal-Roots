<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | Royal Roots AI</title>
    <meta name="description" content="{{META_DESC}}">
    <link rel="canonical" href="https://www.royalrootsply.com/blog/{{SLUG}}.html">
    <link rel="icon" type="image/png" href="../assets/images/logo/favicon.png">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "https://www.royalrootsply.com/blog/{{SLUG}}.html"
      },
      "headline": "{{TITLE}}",
      "description": "{{META_DESC}}",
      "image": "{{IMAGE_URL}}",
      "author": {
        "@type": "Organization",
        "name": "Royal Roots Experts"
      },
      "datePublished": "{{DATE}}"
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
    
    <style>
        /* Standalone Article Styles using Stitch Blueprint */
        :root {
            --charcoal: #1A1A1A;
            --charcoal-light: #2A2A2A;
            --gold: #D4AF37;
            --gold-light: #F3E5AB;
            --cream: #FAF9F6;
        }
        body {
            background-color: var(--charcoal);
            color: var(--cream);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        nav {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-logo { font-family: 'Newsreader', serif; font-size: 24px; color: var(--gold); text-decoration: none; }
        .nav-link { color: var(--cream); text-decoration: none; margin-left: 32px; font-weight: 500; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .article-hero {
            height: 60vh;
            min-height: 400px;
            background-image: linear-gradient(rgba(26,26,26,0.3), rgba(26,26,26,1)), url('{{IMAGE_URL}}');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 80px 40px;
        }
        .hero-content {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        .category-badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            margin-bottom: 24px;
        }
        .hero-title {
            font-family: 'Newsreader', serif;
            font-size: clamp(36px, 5vw, 56px);
            color: var(--gold-light);
            margin: 0 0 24px 0;
            line-height: 1.1;
        }
        .hero-meta {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            display: flex;
            gap: 20px;
        }
        
        .article-body {
            max-width: 760px;
            margin: 80px auto;
            padding: 0 40px;
            font-size: 18px;
            color: #E2E2E2;
        }
        .article-body h2 {
            font-family: 'Newsreader', serif;
            color: var(--gold);
            font-size: 32px;
            margin: 60px 0 24px;
            font-weight: 400;
        }
        .article-body h3 {
            font-family: 'Newsreader', serif;
            color: var(--gold-light);
            font-size: 24px;
            margin: 40px 0 16px;
            font-weight: 400;
        }
        .article-body p { margin-bottom: 24px; }
        .article-body ul { margin-bottom: 30px; padding-left: 20px; }
        .article-body li { margin-bottom: 12px; }
        .article-body blockquote {
            border-left: 3px solid var(--gold);
            padding-left: 24px;
            margin: 40px 0;
            font-family: 'Newsreader', serif;
            font-style: italic;
            font-size: 24px;
            color: var(--gold-light);
        }
        
        .author-box {
            max-width: 760px;
            margin: 0 auto 100px;
            padding: 40px;
            background: var(--charcoal-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .author-box img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); }
        .author-box h4 { margin: 0 0 8px; font-family: 'Newsreader', serif; font-size: 22px; color: var(--gold); }
        .author-box p { margin: 0; color: rgba(255,255,255,0.7); font-size: 15px; }
    </style>
</head>
<body>

    <nav>
        <a href="../index.html" class="nav-logo" style="display: flex; align-items: center;">
            <img src="../assets/images/logo/logo-white.png" alt="Homify Roots" height="36" style="margin-right:12px; max-width: 130px; object-fit: contain;">
            <img src="../assets/images/logo/logo-color.png" alt="Royal Roots Ply" height="36" style="max-width: 130px; object-fit: contain;">
        </a>
        <div>
            <a href="index.html" class="nav-link">Knowledge Hub</a>
            <a href="../contact.html" class="nav-link" style="color: var(--gold);">Get Quote</a>
        </div>
    </nav>

    <header class="article-hero">
        <div class="hero-content">
            <span class="category-badge">{{CATEGORY}}</span>
            <h1 class="hero-title">{{TITLE}}</h1>
            <div class="hero-meta">
                <span>By Royal Roots Experts</span>
                <span>•</span>
                <span>{{DATE_FORMATTED}}</span>
                <span>•</span>
                <span>{{READ_TIME}} min read</span>
            </div>
        </div>
    </header>

    <main class="article-body">
{{CONTENT}}
    </main>

    <div class="author-box">
        <img src="../assets/images/logo/favicon.png" alt="Royal Roots" style="background: black; padding: 10px;">
        <div>
            <h4>Royal Roots Technical Team</h4>
            <p>Premium IS:710 certified plywood, stylish laminates, and advanced architectural surfaces for the modern creator.</p>
        </div>
    </div>

</body>
</html>
