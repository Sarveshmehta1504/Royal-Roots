<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Roots Studio — Content Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --charcoal: #1A1A1A;
            --gold: #D4AF37;
            --gold-bg: rgba(212,175,55,.08);
            --cream: #FAF9F6;
            --border: #eee;
            --red: #e53e3e;
            --green: #38a169;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--charcoal);}

        /* HEADER */
        .header{background:var(--charcoal);padding:14px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--gold);}
        .header .brand{display:flex;align-items:center;gap:14px;}
        .header img{height:36px;object-fit:contain;}
        .header h1{font-family:'Newsreader',serif;color:var(--gold);font-size:22px;font-weight:400;}
        .header .logout{color:#ccc;text-decoration:none;font-size:14px;padding:8px 16px;border:1px solid #555;border-radius:6px;transition:.2s;}
        .header .logout:hover{border-color:var(--gold);color:var(--gold);}

        /* LAYOUT */
        .app{display:grid;grid-template-columns:350px 1fr;height:calc(100vh - 63px);}
        .panel{overflow-y:auto;padding:20px;}
        .panel-left{border-right:1px solid var(--border);background:white;}
        .panel-right{background:var(--cream);}

        /* PANEL TOOLBAR */
        .toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center;}
        .toolbar h2{font-size:16px;font-weight:700;flex:1;}
        .btn{font-family:'Outfit',sans-serif;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:7px;}
        .btn-primary{background:var(--gold);color:var(--charcoal);}
        .btn-primary:hover{background:#c8a42e;}
        .btn-outline{background:white;color:var(--charcoal);border:1.5px solid var(--border);}
        .btn-outline:hover{border-color:var(--gold);}
        .btn-danger{background:var(--red);color:white;}
        .btn-danger:hover{background:#c53030;}
        .btn-sm{padding:6px 12px;font-size:13px;}
        .btn-ghost{background:transparent;color:#666;border:1.5px solid var(--border);}
        .btn-ghost:hover{color:var(--charcoal);border-color:var(--charcoal);}

        /* BLOG LIST */
        .blog-list{display:flex;flex-direction:column;gap:8px;}
        .blog-item{background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.2s;}
        .blog-item:hover,.blog-item.active{border-color:var(--gold);background:var(--gold-bg);}
        .blog-item__title{font-weight:600;font-size:14px;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
        .blog-item__meta{font-size:12px;color:#888;display:flex;gap:10px;margin-bottom:8px;}
        .blog-item__actions{display:flex;gap:6px;}
        .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--gold-bg);color:var(--charcoal);}

        /* SEARCH */
        .search-box{position:relative;margin-bottom:14px;}
        .search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#aaa;}
        .search-box input{width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;}
        .search-box input:focus{border-color:var(--gold);}

        /* EDITOR */
        .editor-card{background:white;border-radius:14px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.05);}
        .editor-card h2{font-family:'Newsreader',serif;font-size:24px;margin-bottom:20px;color:var(--charcoal);}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        .form-group{margin-bottom:18px;}
        .form-group label{display:block;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#444;margin-bottom:8px;}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:15px;color:var(--charcoal);outline:none;transition:.2s;}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
        .form-group textarea{resize:vertical;min-height:220px;line-height:1.6;}

        /* Image uploader */
        .upload-zone{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:.2s;position:relative;}
        .upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:var(--gold-bg);}
        .upload-zone img.preview{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-top:10px;}
        .upload-zone i{font-size:28px;color:#bbb;margin-bottom:8px;}
        .upload-zone p{font-size:13px;color:#888;}
        .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}

        /* Status alerts */
        .alert{padding:12px 18px;border-radius:8px;font-size:14px;font-weight:600;margin-bottom:16px;display:none;}
        .alert.show{display:block;}
        .alert-success{background:#f0fff4;color:var(--green);border:1px solid #c6f6d5;}
        .alert-error{background:#fff5f5;color:var(--red);border:1px solid #fed7d7;}
        .alert-info{background:#ebf8ff;color:#2b6cb0;border:1px solid #bee3f8;}

        /* AI Generate */
        .ai-section{background:var(--charcoal);color:white;border-radius:14px;padding:24px;margin-bottom:20px;}
        .ai-section h3{font-family:'Newsreader',serif;color:var(--gold);font-size:20px;margin-bottom:8px;}
        .ai-section p{font-size:14px;opacity:.7;margin-bottom:14px;}
        .ai-row{display:flex;gap:10px;}
        .ai-row input{flex:1;padding:12px 16px;border-radius:8px;border:none;font-size:15px;font-family:inherit;outline:none;}
        .ai-row .btn{flex-shrink:0;}
        .spinner{animation:spin 1s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Stats bar */
        .stats-bar{display:flex;gap:16px;margin-bottom:20px;}
        .stat{background:white;border:1.5px solid var(--border);border-radius:10px;padding:14px 20px;flex:1;text-align:center;}
        .stat__num{font-size:26px;font-weight:700;color:var(--gold);}
        .stat__label{font-size:12px;color:#888;margin-top:2px;}

        /* Empty state */
        .empty{text-align:center;padding:40px 20px;color:#aaa;}
        .empty i{font-size:40px;margin-bottom:12px;display:block;}

        /* Loading */
        .loading{text-align:center;padding:20px;color:#aaa;font-size:14px;}

        /* Tab nav */
        .tab-nav{display:flex;gap:4px;background:#f0f0f0;border-radius:10px;padding:4px;margin-bottom:20px;}
        .tab-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:#888;transition:.2s;font-family:inherit;}
        .tab-btn.active{background:white;color:var(--charcoal);box-shadow:0 2px 6px rgba(0,0,0,.08);}
    </style>
</head>
<body>

<header class="header">
    <div class="brand">
        <img src="/scripts/static/img/logo-color.png" onerror="this.src='/assets/images/logo/logo-color.png'" alt="Royal Roots">
        <h1>Content Studio</h1>
    </div>
    <a href="/logout" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</header>

<div class="app">
    <!-- LEFT PANEL: Blog List -->
    <div class="panel panel-left">
        <div class="toolbar">
            <h2>All Articles</h2>
            <button class="btn btn-primary btn-sm" onclick="newBlog()"><i class="fas fa-plus"></i> New</button>
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search articles…" oninput="filterBlogs()">
        </div>
        <div id="blogList" class="blog-list"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div></div>
    </div>

    <!-- RIGHT PANEL: Editor -->
    <div class="panel panel-right">

        <!-- AI Generator -->
        <div class="ai-section">
            <h3><i class="fas fa-wand-magic-sparkles"></i> AI Article Generator</h3>
            <p>Generate a full SEO-optimized article with Gemini AI. It saves directly to Firestore.</p>
            <div class="ai-row">
                <input type="text" id="aiTopic" placeholder="e.g. 'Best plywood for modular kitchens in 2025'">
                <button class="btn btn-primary" id="aiBtn" onclick="generateAI()"><i class="fas fa-bolt"></i> Generate</button>
            </div>
            <div id="aiAlert" class="alert" style="margin-top:12px;"></div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat"><div class="stat__num" id="totalCount">—</div><div class="stat__label">Total Articles</div></div>
            <div class="stat"><div class="stat__num" id="publishedCount">—</div><div class="stat__label">Published</div></div>
        </div>

        <!-- Alert -->
        <div id="formAlert" class="alert"></div>

        <!-- Editor Card -->
        <div class="editor-card" id="editorCard">
            <h2 id="editorTitle">Select an article to edit, or create a new one</h2>
            <div id="editorBody" style="display:none;">
                <input type="hidden" id="editId">
                
                <!-- Tab nav -->
                <div class="tab-nav">
                    <button class="tab-btn active" onclick="switchTab('details',this)">Article Details</button>
                    <button class="tab-btn" onclick="switchTab('content',this)">Content</button>
                    <button class="tab-btn" onclick="switchTab('image',this)">Image</button>
                </div>

                <!-- Tab: Details -->
                <div id="tab-details">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="efTitle" placeholder="Article headline…" oninput="autoSlug()">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category</label>
                            <input type="text" id="efCategory" placeholder="e.g. Interior Design">
                        </div>
                        <div class="form-group">
                            <label>Tag / Topic</label>
                            <input type="text" id="efTag" placeholder="e.g. Plywood Guide">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>URL Slug</label>
                            <input type="text" id="efSlug" placeholder="auto-generated">
                        </div>
                        <div class="form-group">
                            <label>Read Time</label>
                            <input type="text" id="efReadTime" placeholder="5 min">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Meta Description (SEO)</label>
                        <input type="text" id="efMeta" placeholder="160-character SEO description…">
                    </div>
                    <div class="form-group">
                        <label>Excerpt</label>
                        <input type="text" id="efExcerpt" placeholder="Short summary shown in cards…">
                    </div>
                </div>

                <!-- Tab: Content -->
                <div id="tab-content" style="display:none;">
                    <div class="form-group">
                        <label>Article Body (HTML supported)</label>
                        <textarea id="efContent" placeholder="Write your article HTML here…"></textarea>
                    </div>
                </div>

                <!-- Tab: Image -->
                <div id="tab-image" style="display:none;">
                    <div class="form-group">
                        <label>Featured Image</label>
                        <div class="upload-zone" id="uploadZone">
                            <input type="file" id="imageFile" accept="image/*" onchange="handleImageSelect()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Click to upload or drag & drop</p>
                            <small style="color:#aaa;">JPG, PNG, WebP accepted</small>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Or paste Image URL</label>
                        <input type="text" id="efImage" placeholder="https://…">
                    </div>
                    <div id="uploadProgress" class="alert alert-info" style="display:none;"></div>
                </div>

                <!-- Actions -->
                <div style="display:flex;gap:10px;padding-top:8px;">
                    <button class="btn btn-primary" onclick="saveBlog()"><i class="fas fa-save"></i> Save Article</button>
                    <button class="btn btn-ghost" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel</button>
                    <button class="btn btn-danger btn-sm" id="deleteBtn" onclick="deleteBlog()" style="margin-left:auto;display:none;"><i class="fas fa-trash"></i> Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let allBlogs = [];
    let currentEditId = null;

    // ─── Fetch blog list ──────────────────────────────────────────────────────
    async function loadBlogs() {
        const res = await fetch('/api/blogs');
        allBlogs = await res.json();
        renderList(allBlogs);
        document.getElementById('totalCount').textContent = allBlogs.length;
        document.getElementById('publishedCount').textContent = allBlogs.filter(b => b.published !== false).length;
    }

    function renderList(blogs) {
        const el = document.getElementById('blogList');
        if (!blogs.length) {
            el.innerHTML = `<div class="empty"><i class="fas fa-newspaper"></i>No articles yet. Create one!</div>`;
            return;
        }
        el.innerHTML = blogs.map(b => `
            <div class="blog-item ${currentEditId===b.id?'active':''}" onclick="editBlog('${b.id}')">
                <div class="blog-item__title">${b.title}</div>
                <div class="blog-item__meta">
                    <span><i class="fas fa-tag"></i> ${b.category||'Uncategorised'}</span>
                    <span><i class="fas fa-clock"></i> ${b.read_time||'—'}</span>
                </div>
                <div class="blog-item__actions">
                    <span class="badge">${b.published!==false?'Published':'Draft'}</span>
                    <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();window.open('/blog/${b.slug}','_blank')"><i class="fas fa-eye"></i></button>
                </div>
            </div>`).join('');
    }

    function filterBlogs() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderList(allBlogs.filter(b => (b.title+b.category+b.tag).toLowerCase().includes(q)));
    }

    // ─── Editor helpers ───────────────────────────────────────────────────────
    function showEditor(blog = {}) {
        document.getElementById('editorBody').style.display = 'block';
        document.getElementById('editorTitle').textContent = blog.id ? 'Edit Article' : 'New Article';
        document.getElementById('editId').value = blog.id || '';
        document.getElementById('efTitle').value = blog.title || '';
        document.getElementById('efCategory').value = blog.category || '';
        document.getElementById('efTag').value = blog.tag || '';
        document.getElementById('efSlug').value = blog.slug || '';
        document.getElementById('efReadTime').value = blog.read_time || '';
        document.getElementById('efMeta').value = blog.meta_desc || '';
        document.getElementById('efExcerpt').value = blog.excerpt || '';
        document.getElementById('efContent').value = blog.content || '';
        document.getElementById('efImage').value = blog.image_url || '';
        document.getElementById('deleteBtn').style.display = blog.id ? 'block' : 'none';
        currentEditId = blog.id || null;
        switchTab('details', document.querySelector('.tab-btn'));
    }

    function newBlog() { showEditor({}); }
    function cancelEdit() {
        document.getElementById('editorBody').style.display = 'none';
        document.getElementById('editorTitle').textContent = 'Select an article to edit, or create a new one';
        currentEditId = null;
        renderList(allBlogs);
    }

    function editBlog(id) {
        const blog = allBlogs.find(b => b.id === id);
        if (blog) showEditor(blog);
    }

    function autoSlug() {
        const title = document.getElementById('efTitle').value;
        const slug = title.toLowerCase().trim().replace(/[^\w\s-]/g,'').replace(/[\s_-]+/g,'-').slice(0,80);
        document.getElementById('efSlug').value = slug;
    }

    function switchTab(name, btn) {
        ['details','content','image'].forEach(t => {
            document.getElementById('tab-'+t).style.display = t===name ? 'block' : 'none';
        });
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
    }

    // ─── Save blog ────────────────────────────────────────────────────────────
    async function saveBlog() {
        const id = document.getElementById('editId').value;
        const payload = {
            title: document.getElementById('efTitle').value.trim(),
            category: document.getElementById('efCategory').value.trim(),
            tag: document.getElementById('efTag').value.trim(),
            slug: document.getElementById('efSlug').value.trim(),
            read_time: document.getElementById('efReadTime').value.trim(),
            meta_desc: document.getElementById('efMeta').value.trim(),
            excerpt: document.getElementById('efExcerpt').value.trim(),
            content: document.getElementById('efContent').value.trim(),
            image_url: document.getElementById('efImage').value.trim(),
            published: true,
        };
        if (!payload.title || !payload.content) {
            showAlert('formAlert', 'Title and Content are required.', 'error');
            return;
        }
        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/blogs/${id}` : '/api/blogs';
        const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        if (res.ok) {
            showAlert('formAlert', '✅ Article saved successfully!', 'success');
            loadBlogs();
        } else {
            const err = await res.json();
            showAlert('formAlert', '❌ Error: ' + (err.error || 'Save failed'), 'error');
        }
    }

    // ─── Delete blog ──────────────────────────────────────────────────────────
    async function deleteBlog() {
        const id = document.getElementById('editId').value;
        if (!id || !confirm('Permanently delete this article from Firestore?')) return;
        const res = await fetch(`/api/blogs/${id}`, { method: 'DELETE' });
        if (res.ok) {
            showAlert('formAlert', '🗑️ Article deleted.', 'success');
            cancelEdit();
            loadBlogs();
        }
    }

    // ─── Upload image ─────────────────────────────────────────────────────────
    async function handleImageSelect() {
        const file = document.getElementById('imageFile').files[0];
        if (!file) return;
        const pEl = document.getElementById('uploadProgress');
        pEl.textContent = '⏳ Uploading image to Firebase Storage…';
        pEl.style.display = 'block';
        const form = new FormData();
        form.append('file', file);
        const res = await fetch('/api/upload', { method: 'POST', body: form });
        const data = await res.json();
        if (data.url) {
            document.getElementById('efImage').value = data.url;
            pEl.className = 'alert alert-success show';
            pEl.textContent = '✅ Uploaded! URL filled in below.';
        } else {
            pEl.className = 'alert alert-error show';
            pEl.textContent = '❌ Upload failed: ' + (data.error || 'Unknown error');
        }
    }

    // ─── AI generate ─────────────────────────────────────────────────────────
    async function generateAI() {
        const topic = document.getElementById('aiTopic').value.trim();
        if (!topic) { document.getElementById('aiAlert').textContent = 'Please enter a topic.'; showAlert('aiAlert','Please enter a topic.','error'); return; }
        const btn = document.getElementById('aiBtn');
        btn.innerHTML = '<i class="fas fa-spinner spinner"></i> Generating…';
        btn.disabled = true;
        showAlert('aiAlert', '🤖 Gemini AI is crafting your article (20-40s)…', 'info');
        const res = await fetch('/api/generate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ topic }) });
        btn.innerHTML = '<i class="fas fa-bolt"></i> Generate';
        btn.disabled = false;
        if (res.ok) {
            const blog = await res.json();
            showAlert('aiAlert', `✅ "${blog.title}" created and saved to Firestore!`, 'success');
            document.getElementById('aiTopic').value = '';
            loadBlogs();
            showEditor(blog);
        } else {
            const err = await res.json();
            showAlert('aiAlert', '❌ AI Error: ' + err.error, 'error');
        }
    }

    // ─── Utilities ────────────────────────────────────────────────────────────
    function showAlert(id, msg, type) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.className = `alert alert-${type} show`;
        setTimeout(() => { el.className = `alert alert-${type}`; }, 6000);
    }

    // Init
    loadBlogs();
</script>
</body>
</html>
