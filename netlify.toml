[build]
  command = "mkdir -p dist && rsync -a --exclude='netlify' --exclude='functions' --exclude='dist' --exclude='.git' . dist/ && echo 'Static files prepared in dist/'"
  publish = "dist"
  functions = "functions"

# ── Admin & Auth (always need the backend) ──
[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/backend/admin"
  status = 200
  force = true

[[redirects]]
  from = "/login"
  to = "/.netlify/functions/backend/login"
  status = 200
  force = true

[[redirects]]
  from = "/logout"
  to = "/.netlify/functions/backend/logout"
  status = 200
  force = true

[[redirects]]
  from = "/verify_token"
  to = "/.netlify/functions/backend/verify_token"
  status = 200
  force = true

# ── API endpoints (backend functions) ──
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/backend/api/:splat"
  status = 200
  force = true

# ── Blog: Individual articles → static reader ──
# We use force = false so that real files (like index.html, reader.html, or images) are served first.
# Only if the file DOES NOT exist will it rewrite to reader.html.
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/reader.html?slug=:slug"
  status = 200
  force = false

# ── Explicitly handle the blog root just in case ──
[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200
  force = false

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "apiKey,appId,authDomain,measurementId,messagingSenderId,projectId,storageBucket"
