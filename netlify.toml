[build]
  command = "cp server.py netlify/functions/ && cp requirements.txt netlify/functions/ && cp -r scripts netlify/functions/ && echo 'Build Complete'"
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/handler"
  status = 200
  force = true

[[redirects]]
  from = "/login"
  to = "/.netlify/functions/handler"
  status = 200
  force = true

[[redirects]]
  from = "/logout"
  to = "/.netlify/functions/handler"
  status = 200
  force = true

[[redirects]]
  from = "/verify_token"
  to = "/.netlify/functions/handler"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/handler"
  status = 200
  force = true

[[redirects]]
  from = "/blog/*"
  to = "/.netlify/functions/handler"
  status = 200
  force = true

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "apiKey,appId,authDomain,measurementId,messagingSenderId,projectId,storageBucket"
